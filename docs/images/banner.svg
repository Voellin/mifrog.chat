<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
    <defs>
        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5e6ad2"/>
            <stop offset="100%" stop-color="#828fff"/>
        </linearGradient>
        <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f7f8f8"/>
            <stop offset="100%" stop-color="#d0d6e0"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5e6ad2"/>
            <stop offset="100%" stop-color="#828fff"/>
        </linearGradient>
        <radialGradient id="bgGlow" cx="50%" cy="0%" r="60%">
            <stop offset="0%" stop-color="#5e6ad2" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#010102" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="1280" height="360" fill="#010102"/>
    <rect width="1280" height="360" fill="url(#bgGlow)"/>
    <line x1="0" y1="1" x2="1280" y2="1" stroke="#23252a" stroke-width="1"/>
    <g transform="translate(600 78)">
        <rect width="80" height="80" rx="18" ry="18" fill="url(#brandGrad)"/>
        <rect width="80" height="22" rx="18" ry="18" fill="#ffffff" opacity="0.08"/>
        <g transform="translate(40 40)">
            <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
                  font-size="46" font-weight="700"
                  fill="#ffffff"
                  text-anchor="middle"
                  dominant-baseline="central">M</text>
        </g>
    </g>
    <text x="640" y="208" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif"
          font-size="58" font-weight="600"
          fill="url(#titleGrad)" text-anchor="middle"
          letter-spacing="-2">
        <tspan>Mifrog &#183; </tspan><tspan fill="url(#accentGrad)">米蛙</tspan>
    </text>
    <text x="640" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif"
          font-size="20" font-weight="400"
          fill="#d0d6e0" text-anchor="middle"
          letter-spacing="-0.4">
        你的飞书，接入 AI 执行大脑
    </text>
    <text x="640" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="13" font-weight="500"
          fill="#8a8f98" text-anchor="middle"
          letter-spacing="2">
        OPEN SOURCE  &#183;  SELF-HOSTED  &#183;  ENTERPRISE-READY
    </text>
    <line x1="0" y1="359" x2="1280" y2="359" stroke="#23252a" stroke-width="1"/>
</svg>
